apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-repo-creds
  namespace: argocd
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: vault-backend 
    kind: ClusterSecretStore

  target:
    name: repo-creds
    creationPolicy: Owner

    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: git@github.com:Ajaz3800/gitops-platform-repo.git
        sshPrivateKey: "{{ .sshPrivateKey | toString }}"
        project: k8s-security
  
  data: 
    - secretKey: sshPrivateKey
      remoteRef:
        key: github-ssh
        property: sshPrivateKey