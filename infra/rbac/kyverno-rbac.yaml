apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-extra
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno-extra
subjects:
  - kind: ServiceAccount
    name: kyverno
    namespace: kyverno
roleRef:
  kind: ClusterRole
  name: kyverno-extra
  apiGroup: rbac.authorization.k8s.io