apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "https://192.168.56.13:8200"
      path: "secret"
      version: "v2"
      caProvider:
        type: Secret
        name: vault-ca-cert
        key: ca.crt
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "devsecops-role"
          serviceAccountRef:
            name: vault-auth
            namespace: vault
          secretRef:
            name: vault-auth-token
            namespace: vault
            key: token
