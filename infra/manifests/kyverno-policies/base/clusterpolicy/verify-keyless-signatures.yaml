apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-keyless-signatures

spec:
  validationFailureAction: Enforce
  background: false

  rules:
    - name: verify-image

      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - dev
                - prod

      verifyImages:
        - imageReferences:
            - "harbor.internal:30080/*"
          repository: "harbor.internal:30080"
          mutateDigest: false
          useCache: false
          insecureRegistry: true 

          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subject: "https://github.com/Ajaz3800/devsecops-app/.github/workflows/ci-build.yaml@refs/heads/main"
                    rekor:
                      url: https://rekor.sigstore.dev
