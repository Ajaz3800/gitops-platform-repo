apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies-app
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io/background
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: k8s-infra
  source:
    repoURL: git@github.com:Ajaz3800/gitops-platform-repo.git
    path: infra/manifests/kyverno-policies
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true